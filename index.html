<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 0 - Task Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            
            <div class="card-header">
                <div class="title-section">
                    <label class="checkbox-container">
                        <input type="checkbox" data-testid="test-todo-complete-toggle" id="task-checkbox">
                        <span class="checkmark"></span>
                    </label>
                    <h2 data-testid="test-todo-title">Complete Insurance Law Summary</h2>
                </div>
                
                <div class="action-buttons">
                    <button class="btn-edit" data-testid="test-todo-edit-button" aria-label="Edit Task">Edit</button>
                    <button class="btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task">Delete</button>
                </div>
            </div>

            <p class="description" data-testid="test-todo-description">
                Draft the final summary for the 200-level Insurance Law course. Focus on the Law of Tort and contract fundamentals.
            </p>

            <div class="metadata">
                <span class="badge priority" data-testid="test-todo-priority">High Priority</span>
                <span class="badge status" data-testid="test-todo-status">In Progress</span>
            </div>

            <div class="deadline-section">
                <div class="date-row">
                    <span>Deadline:</span>
                    <time datetime="2026-04-16T23:59" data-testid="test-todo-due-date">April 16, 2026</time>
                </div>
                <div class="date-row">
                    <span>Remaining:</span>
                    <span class="time-text" data-testid="test-todo-time-remaining">Calculating...</span>
                </div>
            </div>

            <div class="tags" data-testid="test-todo-tags">
                <span class="tag" data-testid="test-todo-tag-work">Work</span>
                <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
            </div>

        </article>
    </main>

    <script src="apps.js"></script>
</body>
</html>
